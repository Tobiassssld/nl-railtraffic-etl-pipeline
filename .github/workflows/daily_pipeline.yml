name: Daily NS Rail ETL Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/**'

jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directories
      run: |
        mkdir -p data/raw
        mkdir -p data/processed
        mkdir -p logs

    - name: Run ETL Pipeline
      env:
        # NS API
        NS_API_KEY: ${{ secrets.NS_API_KEY }}

        # AWS credentials — boto3 reads these automatically,
        # same as reading from .env locally
        AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION:    eu-central-1
        AWS_S3_BUCKET:         ${{ secrets.AWS_S3_BUCKET }}

        # RDS PostgreSQL — psycopg2 reads these via python-dotenv / os.getenv
        AWS_RDS_HOST:     ${{ secrets.AWS_RDS_HOST }}
        AWS_RDS_PORT:     5432
        AWS_RDS_DBNAME:   postgres
        AWS_RDS_USER:     postgres
        AWS_RDS_PASSWORD: ${{ secrets.AWS_RDS_PASSWORD }}
      run: |
        python src/pipeline.py

    - name: Upload pipeline artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pipeline-outputs-${{ github.run_number }}
        path: |
          data/processed/*.csv
          logs/*.log
        retention-days: 7

    - name: Notify on failure
      if: failure()
      run: |
        echo "Pipeline failed! Check the logs above for details."